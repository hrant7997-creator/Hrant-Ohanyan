<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word Counter</title>
  <link rel="stylesheet" href="style.css">  
</head>
<body>

<h1>Text Counter</h1>

<textarea id="textInput" placeholder="Write text here..."></textarea>

<br><br>

<button onclick="countText()">Count Text</button>
<button onclick="randomBackground()">Random Background</button>

<h3>Results</h3>
<p>Letters: <span id="letters">0</span></p>
<p>Words: <span id="words">0</span></p>
<p>Sentences: <span id="sentences">0</span></p>

<script src="script.js"></script>
</body>
</html>
